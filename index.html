  <!-- Local library shim: remembers your calendars (and their edit keys)
       on this device using the browser's localStorage. Do not change. -->
  <script>
    (function () {
      if (window.storage) return;
      var LS; try { LS = window.localStorage; } catch (e) { LS = null; }
      window.storage = {
        get: function (k) { try { var v = LS && LS.getItem(k); return Promise.resolve(v == null ? null : { key: k, value: v, shared: false }); } catch (e) { return Promise.resolve(null); } },
        set: function (k, v) { try { if (LS) LS.setItem(k, v); return Promise.resolve({ key: k, value: v, shared: false }); } catch (e) { return Promise.resolve(null); } },
        delete: function (k) { try { if (LS) LS.removeItem(k); return Promise.resolve({ key: k, deleted: true }); } catch (e) { return Promise.resolve(null); } },
        list: function (p) { try { var ks = []; if (LS) { for (var i = 0; i < LS.length; i++) { var kk = LS.key(i); if (!p || (kk && kk.indexOf(p) === 0)) ks.push(kk); } } return Promise.resolve({ keys: ks, prefix: p || "" }); } catch (e) { return Promise.resolve({ keys: [] }); } }
      };
    })();
  </script>
